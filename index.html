<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerQuest | Explore Your Future</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }

        /* ΤΟ BACKGROUND ΕΔΩ */
        .hero-section {
            height: 100vh;
            width: 100%;
          
            background-image: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.5)), 
                              url('background.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            position: relative;
        }

        .content {
            z-index: 2;
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -2px;
        }

        .tagline {
            font-size: clamp(1.1rem, 3vw, 1.5rem);
            margin-bottom: 40px;
            opacity: 0.9;
            font-weight: 400;
        }

        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        button:hover {
            background-color: #2563eb;
            transform: translateY(-3px);
        }

        .disclaimer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            opacity: 0.7;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="content">
            <p class="tagline">Σχεδιάστε την επαγγελματική σας πορεία με τη δύναμη της ανάλυσης δεδομένων και της αυτογνωσίας.</p>
            <button onclick="window.location.href='quiz.html'">ΞΕΚΙΝΑ ΤΟ QUIZ</button>
        </div>

        <div class="disclaimer">
            Σημείωση: Το CareerQuest είναι εκπαιδευτικό εργαλείο. Δεν αποτελεί επίσημη ψυχομετρική αξιολόγηση.
        </div>
    </div>

</body>
</html>
